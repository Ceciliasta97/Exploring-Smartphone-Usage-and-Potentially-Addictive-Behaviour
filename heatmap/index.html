<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Average Addiction Level by Screen Time and Sleep</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Addiction Patterns Across Screen Time and Sleep</h1>
  <p class="subtitle">
    This heatmap compares daily screen time with another indicator. Each cell groups users within that
    range, and the colour shows the average addiction level in that group.
  </p>

  <label for="yVariableSelect"><strong>Compare screen time with:</strong></label>
  <select id="yVariableSelect">
    <option value="sleep">Sleep Hours</option>
    <option value="stress">Stress Level</option>
    <option value="workStudy">Work/Study Hours</option>
    <option value="notifications">Notifications per Day</option>
    <option value="apps">App Opens per Day</option>
</select>

  <div id="chart"></div>
  <div id="tooltip" class="tooltip"></div>

  <script src="heatmap.js"></script>
</body>
</html>
